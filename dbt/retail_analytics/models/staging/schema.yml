version: 2

models:
  - name: stg_orders
    description: "Cleaned orders — canceled and unavailable statuses excluded"
    columns:
      - name: order_id
        description: "Primary key"
        tests:
          - not_null
          - unique

      - name: customer_id
        tests:
          - not_null

      - name: order_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['delivered', 'shipped', 'invoiced', 'processing', 'created', 'approved']

  - name: stg_order_items
    columns:
      - name: order_id
        tests:
          - not_null

      - name: product_id
        tests:
          - not_null

      - name: seller_id
        tests:
          - not_null

      - name: price
        tests:
          - not_null

  - name: stg_customers
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

      - name: customer_unique_id
        tests:
          - not_null

      - name: customer_state
        tests:
          - not_null

  - name: stg_events
    columns:
      - name: visitor_id
        tests:
          - not_null

      - name: event_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['view', 'addtocart', 'transaction']

      - name: item_id
        tests:
          - not_null

  - name: stg_marketing
    columns:
      - name: campaign_month
        tests:
          - not_null

      - name: channel
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Google Search', 'Instagram', 'Facebook', 'Email', 'Organic']

      - name: spend
        tests:
          - not_null

      - name: roas
        tests:
          - not_null